<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Monogram circle -->
  <circle cx="950" cy="315" r="180" fill="#f6f5f2"/>
  <text x="950" y="395" text-anchor="middle"
        font-family="Georgia, 'Instrument Serif', serif" font-style="italic"
        font-size="220" fill="#0a0a0a">m</text>

  <!-- Eyebrow -->
  <text x="80" y="150" font-family="Inter, sans-serif" font-size="20"
        font-weight="500" fill="#ffffff" fill-opacity="0.55"
        letter-spacing="4">SENIOR PRODUCT DESIGNER · CAIRO</text>

  <!-- Headline -->
  <text x="80" y="270" font-family="Georgia, 'Instrument Serif', serif"
        font-size="92" fill="#f6f5f2" letter-spacing="-2">Muhammed Sarhan</text>
  <text x="80" y="370" font-family="Georgia, 'Instrument Serif', serif"
        font-style="italic" font-size="64" fill="#ffffff" fill-opacity="0.65"
        letter-spacing="-1">Senior product designer.</text>

  <!-- Footer line -->
  <line x1="80" y1="540" x2="1120" y2="540" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>
  <text x="80" y="580" font-family="Inter, sans-serif" font-size="20"
        fill="#ffffff" fill-opacity="0.6" letter-spacing="3">CAIRO, EGYPT</text>
  <text x="1120" y="580" text-anchor="end" font-family="Inter, sans-serif"
        font-size="20" fill="#ffffff" fill-opacity="0.6" letter-spacing="3">MOSARHAN.IO</text>
</svg>
